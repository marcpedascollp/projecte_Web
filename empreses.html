    <script>
      async function lectura_empreses() {
        try{
          const res = await fetch('/lectura_empreses');
          if(!res.ok) throw new Error('error');
          const data = await res.json();
          const empreses_holder=document.getElementById('empreses');
          if(empreses_holder){
            put_empreses(data, empreses_holder);
          } 
        }catch(error){
          console.error(error);
          window.location.href='/';
        }
      }
      function put_empreses(data, empreses_holder){
        for (let i = 0; i < data.length; i++){
          // nom
          const div=document.createElement("div");
          const divnom=document.createElement("div");
          divnom.className="nomempresa"
          div.id=`empresa#${i}`;
          div.className="empresa"
          empreses_holder.appendChild(div);
          const nom=document.createElement("p");
          nom.textContent = data[i].nom;
          div.appendChild(divnom);
          divnom.appendChild(nom);
          // adreça
          const divadreca=document.createElement("div");
          divadreca.className="adrecaempresa"
          const adreca=document.createElement("p");
          adreca.textContent = data[i].adreca;
          div.appendChild(divadreca);
          divadreca.appendChild(adreca)
          // sens funcional ... boolean
          const divsens=document.createElement("div");
          divsens.className="sensempresa";
          const sensempresa=document.createElement("p");
          if(data[i].sens_div_func){
            sensempresa.textContent="Sí"
          } else {
            sensempresa.textContent="No";
          }
          div.appendChild(divsens);
          divsens.appendChild(sensempresa);
          // idoneitat
          const dividoneitat=document.createElement("div");
          dividoneitat.className="idoneitatempresa";
          const idoneitatempresa = document.createElement("p");
          idoneitatempresa.textContent=data[i].idoneitat;
          div.appendChild(dividoneitat);
          dividoneitat.appendChild(idoneitatempresa);
          // comentaris generals
          // actiu
          // incidencies
        }
      }
      lectura_empreses();
      

    </script>
</body>
